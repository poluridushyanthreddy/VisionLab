<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>{% block title %}{% endblock title %} — VisionLab</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #111111;
      color: #e5e5e5;
    }

    .navbar {
      background-color: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .navbar-brand {
      font-weight: 600;
      color: #ffffff !important;
    }

    .nav-link {
      color: #aaaaaa !important;
      font-size: 0.9rem;
    }

    .nav-link:hover,
    .nav-link.active {
      color: #ffffff !important;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">VisionLab</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Segmentation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/detection">Detection</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/depth">Depth Estimation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/pointcloud">Point Cloud</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/results">Results</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {% block body %}{% endblock body %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
